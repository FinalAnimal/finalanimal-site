<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conor Maloney — Final Animal</title>
  <meta name="description" content="Conor Maloney is an audiovisual artist based in Galway, Ireland. Immersive installation, audioreactive performance and electronic instruments.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    body { background: #080808; overflow: hidden; height: 100vh; }

    #hero-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .hero-ui {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 0 64px 56px;
      pointer-events: none;
    }

    .hero-eyebrow {
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: .16em;
      color: var(--accent);
      margin-bottom: 16px;
      opacity: 0;
      animation: fadeUp .8s ease .4s forwards;
    }

    .hero-name {
      font-family: var(--display);
      font-size: clamp(52px, 7vw, 88px);
      font-weight: 300;
      color: var(--text);
      line-height: 1.0;
      letter-spacing: .02em;
      margin-bottom: 8px;
      opacity: 0;
      animation: fadeUp .9s ease .7s forwards;
    }

    .hero-sub {
      font-family: var(--sans);
      font-size: 12px;
      letter-spacing: .14em;
      color: var(--accent-dim);
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp .8s ease 1.0s forwards;
    }

    .enter-btn {
      position: fixed;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      font-family: var(--sans);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .22em;
      color: var(--text);
      border: 0.5px solid rgba(242,239,231,.38);
      padding: 15px 42px;
      background: rgba(8,8,8,.18);
      backdrop-filter: blur(8px);
      cursor: pointer;
      text-decoration: none;
      transition: border-color .4s, color .4s, letter-spacing .4s, background .4s;
      pointer-events: all;
      opacity: 0;
      animation: fadeButton .8s ease 1.4s forwards;
      width: fit-content;
    }

    .enter-btn:hover {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(242,239,231,.06);
      letter-spacing: .28em;
    }

    .enter-btn .arrow {
      transition: transform .4s;
      opacity: .5;
    }

    .enter-btn:hover .arrow {
      transform: translateX(4px);
      opacity: 1;
    }

    .hero-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 28px 64px;
      pointer-events: none;
    }

    .logo {
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: .16em;
      color: var(--accent-dim);
      opacity: 0;
      animation: fadeIn .8s ease .2s forwards;
    }

    .hero-links {
      display: flex;
      gap: 28px;
      pointer-events: all;
      opacity: 0;
      animation: fadeIn .8s ease .2s forwards;
    }

    .hero-links a {
      font-family: var(--sans);
      font-size: 11px;
      letter-spacing: .14em;
      color: var(--accent-dim);
      text-decoration: none;
      transition: color .3s;
    }

    .hero-links a:hover { color: var(--accent); }

    .scroll-hint {
      position: fixed;
      bottom: 56px;
      right: 64px;
      font-family: var(--sans);
      font-size: 9px;
      letter-spacing: .14em;
      color: rgba(139,135,125,.45);
      writing-mode: vertical-rl;
      opacity: 0;
      animation: fadeIn 1s ease 2s forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeButton {
      from { opacity: 0; transform: translate(-50%, calc(-50% + 18px)); }
      to   { opacity: 1; transform: translate(-50%, -50%); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>

<canvas id="hero-canvas"></canvas>

<nav class="hero-nav">
  <div class="logo">FINAL ANIMAL</div>
  <div class="hero-links">
    <a href="work.html">Work</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
  </div>
</nav>

<div class="hero-ui">
  <div class="hero-eyebrow">AUDIOVISUAL ARTIST — GALWAY, IRELAND</div>
  <h1 class="hero-name">Conor<br>Maloney</h1>
  <div class="hero-sub">FINAL ANIMAL</div>
  <a href="work.html" class="enter-btn">
    ENTER
    <span class="arrow">→</span>
  </a>
</div>

<div class="scroll-hint">finalanimal.com</div>

<script>
const canvas = document.getElementById('hero-canvas');
const ctx = canvas.getContext('2d');
let W, H, pts = [], branches = [], t = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}

function buildTree() {
  branches = [];
  pts = [];
  const cx = W * .5, cy = H * .62;
  const ACCENT = '#d8d4c8';

  function branch(x1, y1, x2, y2, depth, maxDepth) {
    if (depth > maxDepth) return;
    branches.push({ x1, y1, x2, y2, depth, maxDepth, alpha: (1 - depth / maxDepth) * .7 + .05, w: Math.max(.3, 1.2 - depth * .18) });
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.sqrt(dx*dx + dy*dy) * .7;
    const angle = Math.atan2(dy, dx);
    const spread = .35 + depth * .04;
    const branches2 = depth < 2 ? 3 : 2;
    const angleStep = (spread * 2) / (branches2 - 1);
    for (let i = 0; i < branches2; i++) {
      const a = angle - spread + angleStep * i + (Math.random() - .5) * .15;
      branch(x2, y2, x2 + Math.cos(a) * len, y2 + Math.sin(a) * len, depth + 1, maxDepth);
    }
    if (depth === maxDepth) {
      for (let i = 0; i < 3; i++) {
        pts.push({
          x: x2 + (Math.random() - .5) * 20,
          y: y2 + (Math.random() - .5) * 20,
          r: Math.random() * 1.2 + .4,
          alpha: Math.random() * .5 + .3,
          phase: Math.random() * Math.PI * 2,
          speed: .4 + Math.random() * .8
        });
      }
    }
  }

  function root(x1, y1, x2, y2, depth, maxDepth) {
    if (depth > maxDepth) return;
    branches.push({ x1, y1, x2, y2, depth, maxDepth, alpha: (1 - depth / maxDepth) * .35 + .03, w: Math.max(.25, .9 - depth * .15), isRoot: true });
    const dx = x2 - x1, dy = y2 - y1;
    const len = Math.sqrt(dx*dx + dy*dy) * .65;
    const angle = Math.atan2(dy, dx);
    const spread = .5 + depth * .05;
    const n = depth < 1 ? 3 : 2;
    const step = (spread * 2) / (n - 1);
    for (let i = 0; i < n; i++) {
      const a = angle - spread + step * i + (Math.random() - .5) * .2;
      root(x2, y2, x2 + Math.cos(a) * len, y2 + Math.sin(a) * len, depth + 1, maxDepth);
    }
  }

  branch(cx, cy, cx, cy - H * .22, 0, 7);
  const rootLen = H * .12;
  root(cx, cy, cx - rootLen * .7, cy + rootLen, 0, 4);
  root(cx, cy, cx + rootLen * .7, cy + rootLen, 0, 4);
  root(cx, cy, cx - rootLen * 1.1, cy + rootLen * .6, 0, 3);
  root(cx, cy, cx + rootLen * 1.1, cy + rootLen * .6, 0, 3);
}

function draw() {
  t += .008;
  ctx.clearRect(0, 0, W, H);

  const cx = W * .5, cy = H * .62;

  const gr = ctx.createRadialGradient(cx, cy, 0, cx, cy, H * .45);
  gr.addColorStop(0, 'rgba(216,212,200,.055)');
  gr.addColorStop(.5, 'rgba(180,170,150,.025)');
  gr.addColorStop(1, 'rgba(8,8,8,0)');
  ctx.fillStyle = gr;
  ctx.fillRect(0, 0, W, H);

  const rg = ctx.createRadialGradient(cx, H * .92, 0, cx, H * .92, H * .3);
  rg.addColorStop(0, 'rgba(216,212,200,.055)');
  rg.addColorStop(1, 'rgba(8,8,8,0)');
  ctx.fillStyle = rg;
  ctx.fillRect(0, 0, W, H);

  for (const b of branches) {
    const flicker = b.isRoot ? 1 : (1 + Math.sin(t * b.w * 2 + b.x1 * .01) * .06);
    ctx.beginPath();
    ctx.moveTo(b.x1, b.y1);
    ctx.lineTo(b.x2, b.y2);
    ctx.strokeStyle = `rgba(216,212,200,${b.alpha * flicker})`;
    ctx.lineWidth = b.w;
    ctx.stroke();
  }

  ctx.beginPath();
  ctx.arc(cx, cy, 5, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,255,255,${.7 + Math.sin(t * 1.8) * .2})`;
  ctx.fill();

  ctx.beginPath();
  ctx.arc(cx, cy, 14 + Math.sin(t * 1.8) * 2, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(216,212,200,${.1 + Math.sin(t * 1.8) * .04})`;
  ctx.fill();

  for (const p of pts) {
    const pulse = .5 + Math.sin(t * p.speed + p.phase) * .4;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(230,226,216,${p.alpha * pulse})`;
    ctx.fill();
  }

  requestAnimationFrame(draw);
}

window.addEventListener('resize', () => { resize(); buildTree(); });
resize();
buildTree();
draw();
</script>
</body>
</html>
